name: Compatibility Matrix

"on":
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  matrix-smoke:
    name: Smoke (${{ matrix.os }}, ${{ matrix.distribution }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        distribution: [liberica, graalvm]
        java: ["25"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: ${{ matrix.java }}
          distribution: ${{ matrix.distribution }}
          cache: maven

      - name: Build launcher JAR
        run: ./mvnw --batch-mode -DskipTests package

      - name: Smoke test launcher
        run: java -jar target/*-launcher.jar --version

      - name: Native image smoke (Linux + GraalVM)
        if: matrix.os == 'ubuntu-latest' && matrix.distribution == 'graalvm'
        run: |
          ./mvnw --batch-mode -Pnative -DskipTests package
          test -x target/habit-hooks
          ./target/habit-hooks --version
