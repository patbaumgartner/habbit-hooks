# SLF4J Simple Logger configuration for habit-hooks CLI.
# Suppress INFO/DEBUG output so internal log statements don't pollute user-facing output.
# WARN and ERROR are still shown (e.g. missing analyzer config files).
org.slf4j.simpleLogger.defaultLogLevel=warn
org.slf4j.simpleLogger.showDateTime=false
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showLogName=false
org.slf4j.simpleLogger.showShortLogName=true
org.slf4j.simpleLogger.levelInBrackets=true
